services:
  service-discovery:
    build: ./services/ServiceDiscovery
    ports:
      - "${SERVICE_DISCOVERY_PORT:-8761}:8761"
    env_file:
      - .env
    networks:
      - app-network
  
  order-service:
    build: ./services/OrderService  # duong dan den thu muc chua Dockerfile cua OrderService
    ports:
      - "${ORDER_SERVICE_PORT:-8081}:8081"
    env_file:
      - .env
    networks:
      - app-network
    depends_on:
      - service-discovery
      - rabbitmq
      - mysql-order
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  payment-service:
    build: ./services/PaymentService # duong dan den thu muc chua Dockerfile cua PaymentService
    ports:
      - "${PAYMENT_SERVICE_PORT:-8082}:8082"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      - service-discovery
      - rabbitmq
      - mysql-payment
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  delivery-service:
    build: ./services/DeliveryService # duong dan den thu muc chua Dockerfile cua DeliveryService
    ports:
      - "${DELIVERY_SERVICE_PORT:-8083}:8083"
    env_file:
      - .env
    depends_on:
      - service-discovery
      - rabbitmq
      - mysql-delivery
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  menu-service:
    build: ./services/MenuService
    ports:
      - "${MENU_SERVICE_PORT:-8085}:8085"
    env_file:
      - .env
    depends_on:
      - service-discovery
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  task-service:
    build: ./services/TaskService
    ports:
      - "${TASK_SERVICE_PORT:-8084}:8084"
    env_file:
      - .env
    depends_on:
      - service-discovery
      - rabbitmq
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  gateway:
    build: ./Gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    env_file:
      - .env
    networks:
      - app-network
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      - service-discovery
      - order-service
      - payment-service
      - delivery-service
      - menu-service
      - task-service

  frontend:
    build: ./Frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - app-network
    depends_on:
      - gateway

  rabbitmq:
    image: rabbitmq:3.12-management
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  mysql-order:
    image: mysql:8.0
    ports:
      - "${MYSQL_ORDER_PORT:-3306}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${ORDER_DB_NAME:-order_db}
      - MYSQL_USER=${ORDER_DB_USER:-order_user}
      - MYSQL_PASSWORD=${ORDER_DB_PASSWORD:-order_password}
    volumes:
      - mysql_order_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-payment:
    image: mysql:8.0
    ports:
      - "${MYSQL_PAYMENT_PORT:-3307}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${PAYMENT_DB_NAME:-payment_db}
      - MYSQL_USER=${PAYMENT_DB_USER:-payment_user}
      - MYSQL_PASSWORD=${PAYMENT_DB_PASSWORD:-payment_password}
    volumes:
      - mysql_payment_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-delivery:
    image: mysql:8.0
    ports:
      - "${MYSQL_DELIVERY_PORT:-3308}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${DELIVERY_DB_NAME:-delivery_db}
      - MYSQL_USER=${DELIVERY_DB_USER:-delivery_user}
      - MYSQL_PASSWORD=${DELIVERY_DB_PASSWORD:-delivery_password}
    volumes:
      - mysql_delivery_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  mysql_order_data:
  mysql_payment_data:
  mysql_delivery_data: