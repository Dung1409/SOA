<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt món ăn</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 30px;
        }

        .container {
            width: 420px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }

        .menu-item {
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .menu-item:hover {
            background: #fafafa;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🍔 Đặt món</h2>

    <input type="text" id="phone" placeholder="Số điện thoại">
    <input type="text" id="address" placeholder="Địa chỉ">

    <h3>Menu</h3>
    <div id="menu">Đang tải menu...</div>

    <h4>Tổng tiền: <span id="total">0đ</span></h4>

    <button onclick="createOrder()">Đặt hàng</button>

    <div id="result"></div>
</div>

<script>
let menuItems = [];
let selectedItems = [];
const MENU_ENDPOINT = "/api/menu/items";
const MENU_ENDPOINT_FALLBACK = "/api-menu/menu/items";
const ORDER_ENDPOINT = "/api/task/order";
const ORDER_STATUS_ENDPOINT = (requestId) => `/api/order/status/${encodeURIComponent(requestId)}`;

function formatPrice(price) {
    return price.toLocaleString("vi-VN") + "đ";
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function fetchJson(url) {
    const response = await fetch(url);

    if (!response.ok) {
        const body = await response.text();
        throw new Error(`HTTP ${response.status}: ${body.slice(0, 120)}`);
    }

    return response.json();
}

async function loadMenu() {
    const menuElement = document.getElementById("menu");
    menuElement.innerText = "Đang tải menu...";

    let lastError = null;
    for (let attempt = 1; attempt <= 12; attempt++) {
        try {
            menuItems = await fetchJson(MENU_ENDPOINT);
            renderMenu();
            return;
        } catch (error) {
            lastError = error;
            menuElement.innerText = `Đang chờ Gateway/MenuService sẵn sàng... (${attempt}/12)`;
            await sleep(2000);
        }
    }

    try {
        menuItems = await fetchJson(MENU_ENDPOINT_FALLBACK);
        renderMenu();
        document.getElementById("result").innerText = "Gateway chưa sẵn sàng, đã fallback sang menu-service.";
    } catch (fallbackError) {
        menuElement.innerText = `Không load được menu: ${String(lastError?.message || "Unknown error")} | Fallback: ${String(fallbackError?.message || "Unknown error")}`;
    }
}

function renderMenu() {
    const menuDiv = document.getElementById("menu");
    menuDiv.innerHTML = "";

    menuItems.forEach(item => {
        const div = document.createElement("div");
        div.className = "menu-item";

        div.innerHTML = `
            <label>
                <input type="checkbox"
                       data-id="${item.id}"
                       data-name="${item.name}"
                       data-price="${item.price}">

                <strong>${item.name}</strong> - ${formatPrice(item.price)}<br>
                <small style="color:gray;">
                    ${item.description || ""}
                </small>
            </label>
        `;

        menuDiv.appendChild(div);
    });

    attachEvents();
}

function attachEvents() {
    const checkboxes = document.querySelectorAll("#menu input");

    checkboxes.forEach(cb => {
        cb.addEventListener("change", () => {
            let total = 0;
            selectedItems = [];

            checkboxes.forEach(c => {
                if (c.checked) {
                    const price = parseFloat(c.dataset.price);
                    total += price;
                    selectedItems.push({
                        id: c.dataset.id,
                        name: c.dataset.name,
                        price
                    });
                }
            });

            document.getElementById("total").innerText = formatPrice(total);
        });
    });
}

async function pollOrderStatus(requestId) {
    const resultElement = document.getElementById("result");

    for (let attempt = 1; attempt <= 20; attempt++) {
        try {
            const response = await fetch(ORDER_STATUS_ENDPOINT(requestId));
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const status = await response.json();
            const orderId = status.orderId ? ` | orderId: ${status.orderId}` : "";
            resultElement.innerText = `Đang xử lý: ${status.status}${orderId}`;

            if (status.status === "COMPLETED") {
                resultElement.innerText = `Đặt hàng thành công${orderId}`;
                return;
            }

            if (status.status === "CANCELLED") {
                resultElement.innerText = `Đặt hàng thất bại${orderId}`;
                return;
            }

            await sleep(1500);
        } catch (error) {
            resultElement.innerText = `Không đọc được trạng thái đơn (${attempt}/20): ${String(error.message || error)}`;
            await sleep(1500);
        }
    }

    resultElement.innerText = `Đã gửi đơn thành công nhưng chưa có kết quả cuối. Dùng requestId để tra cứu: ${requestId}`;
}

async function createOrder() {
    const phone = document.getElementById("phone").value;
    const address = document.getElementById("address").value;

    if (!phone || !address || selectedItems.length === 0) {
        document.getElementById("result").innerText = "Vui lòng nhập đầy đủ thông tin";
        return;
    }

    const total = selectedItems.reduce((sum, item) => sum + item.price, 0);

    const data = {
        amount: total,
        phone,
        description: selectedItems.map(item => item.name).join(", "),
        address,
        menuItemIds: selectedItems.map(item => item.id)
    };

    const resultElement = document.getElementById("result");
    resultElement.innerText = "Đang gửi order...";

    try {
        const response = await fetch(ORDER_ENDPOINT, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const body = await response.json();
        if (!response.ok) {
            resultElement.innerText = `Tạo order lỗi: ${JSON.stringify(body)}`;
            return;
        }

        if (!body.requestId) {
            resultElement.innerText = "Không nhận được requestId để theo dõi trạng thái đơn.";
            return;
        }

        resultElement.innerText = `Đã nhận yêu cầu, requestId: ${body.requestId}`;
        await pollOrderStatus(body.requestId);
    } catch (err) {
        resultElement.innerText = "Lỗi: " + err;
    }
}

loadMenu();
</script>

</body>
</html>
