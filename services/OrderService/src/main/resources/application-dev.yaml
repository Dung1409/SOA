spring:
  application:
    name: order-service
  datasource:
    url: jdbc:mysql://${ORDER_DB_HOST:localhost}:${ORDER_DB_PORT:3306}/${ORDER_DB_NAME:order_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${ORDER_DB_USER:order_user}
    password: ${ORDER_DB_PASSWORD:order_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: ${ORDER_SERVICE_PORT:8081}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
    register-with-eureka: true
    fetch-registry: true
