spring:
  application:
    name: delivery-service
  datasource:
    url: jdbc:mysql://${DELIVERY_DB_HOST:localhost}:${DELIVERY_DB_PORT:3308}/${DELIVERY_DB_NAME:delivery_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DELIVERY_DB_USER:delivery_user}
    password: ${DELIVERY_DB_PASSWORD:delivery_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: ${DELIVERY_SERVICE_PORT:8083}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
    register-with-eureka: true
    fetch-registry: true
