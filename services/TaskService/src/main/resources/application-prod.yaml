spring:
  application:
    name: task-service
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: ${TASK_SERVICE_PORT:8084}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:service-discovery}:${EUREKA_PORT:8761}/eureka/
    register-with-eureka: true
    fetch-registry: true


